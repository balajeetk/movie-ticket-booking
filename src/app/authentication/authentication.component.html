<div class="auth-shell">
  <div class="auth-card">
    <h1>Movie ticket booking</h1>
    <p>Sign in to discover movies, reserve seats, and complete your booking in seconds.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input
          id="email"
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="you@example.com"
          aria-describedby="emailHelp"
        />
        <div class="form-text text-danger" *ngIf="loginForm.controls.email.invalid && loginForm.controls.email.touched">
          Enter a valid email address.
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="••••••••"
        />
        <div class="form-text text-danger" *ngIf="loginForm.controls.password.invalid && loginForm.controls.password.touched">
          Password is required.
        </div>
      </div>

      <button class="btn btn-primary w-100" type="submit">Sign in</button>
    </form>

    <div class="auth-footer">
      <p>
        Use any email and password to sign in. This demo stores the session locally in the browser.
      </p>
    </div>
  </div>
</div>
